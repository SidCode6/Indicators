name: NODE ETF daily snapshot

# Pulls today's NODE holdings from VanEck, appends a snapshot file, regenerates
# public/node/latest.json, and commits the changes back to main. Railway
# auto-deploys on push, so the dashboard picks up the new data automatically.
#
# Schedule: 16:30 UTC daily, but only writes a new file Mon-Fri (VanEck only
# publishes on US trading days). 16:30 UTC = 12:30 EDT / 11:30 EST, both
# safely after VanEck's ~10:25 ET publication.
#
# Idempotent: re-running the same day is a no-op for the snapshot file,
# but always rebuilds latest.json so changes to analysis logic propagate.

on:
  schedule:
    - cron: '30 16 * * 1-5'   # Mon-Fri at 16:30 UTC
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write              # required to commit snapshot files back

concurrency:
  group: node-etf-daily
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can rebase if needed; shallow is fine here.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'fetcher/node_etf/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fetcher/node_etf/requirements.txt

      - name: Run NODE fetcher + analyzer
        run: python -m fetcher.node_etf.run

      - name: Commit & push changes (if any)
        run: |
          if [[ -z "$(git status --porcelain public/node/)" ]]; then
            echo "No NODE data changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/node/
          # Use the as-of date from latest.json in the commit message for traceability.
          AS_OF=$(python -c "import json; print(json.load(open('public/node/latest.json'))['as_of'])")
          git commit -m "NODE snapshot: ${AS_OF}"
          git push
